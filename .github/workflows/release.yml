name: Release

# Build a self-contained portable Windows .exe and publish it to a
# GitHub Release whenever a tag like v0.2.0 is pushed. The auto-update
# system in the desktop app reads /releases/latest from this repo,
# so what's attached here is what users actually pull down.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0). Leave blank to use the current ref.'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.tag }}" -ne "") {
            $tag = "${{ github.event.inputs.tag }}"
          }
          $version = $tag -replace '^v', ''
          # Strip any pre-release suffix for the AssemblyVersion (must be 1.2.3.4)
          $clean = $version -replace '-.*$', ''
          if (($clean.Split('.').Count) -lt 3) { $clean = "$clean.0.0".Substring(0, ($clean.Length + 4)) }
          $assemblyVersion = "$clean.0"
          echo "tag=$tag"               | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "version=$version"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "assemblyVersion=$assemblyVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ChanthraStudio/ChanthraStudio.csproj

      - name: Publish (self-contained, single-file, win-x64)
        shell: pwsh
        run: |
          dotnet publish ChanthraStudio/ChanthraStudio.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=embedded `
            -p:Version=${{ steps.ver.outputs.version }} `
            -p:AssemblyVersion=${{ steps.ver.outputs.assemblyVersion }} `
            -p:FileVersion=${{ steps.ver.outputs.assemblyVersion }} `
            -o publish

      - name: Package portable zip
        shell: pwsh
        run: |
          $zipName = "ChanthraStudio-${{ steps.ver.outputs.tag }}-win-x64.zip"
          Compress-Archive -Path publish/* -DestinationPath $zipName -Force
          # SHA-256 hash for integrity checks in the release notes
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLowerInvariant()
          echo "zipName=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "sha256=$hash"      | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: pkg

      - name: Generate release notes
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          $prev = (git tag --sort=-v:refname | Where-Object { $_ -ne $tag } | Select-Object -First 1)
          if ([string]::IsNullOrEmpty($prev)) {
            $range = "HEAD"
          } else {
            $range = "$prev..HEAD"
          }
          $log = git log $range --pretty=format:"- %s (%h)" --no-merges
          $notes = @"
## Chanthra Studio $tag

$( if ($log) { $log -join "`n" } else { "Initial release." } )

---

**Auto-update:** ผู้ใช้ที่ Activate License แล้ว แอปจะเด้งให้กดอัพเดทเอง
**Manual install:** ดาวน์โหลด ``${{ steps.pkg.outputs.zipName }}`` แล้วแตกไฟล์ทับโฟลเดอร์เดิม
**SHA-256:** ``${{ steps.pkg.outputs.sha256 }}``

ซื้อ License ที่ https://xman4289.com/products/chanthra-studio
อ่านคู่มือการใช้งาน https://xman4289.com/chanthra-studio/manual
"@
          $notes | Out-File -Encoding utf8 release-notes.md
          # Newlines are preserved when we pass the file path to gh release create

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          $zipName = "${{ steps.pkg.outputs.zipName }}"
          gh release create $tag $zipName `
            --title "Chanthra Studio $tag" `
            --notes-file release-notes.md `
            --target ${{ github.sha }}
