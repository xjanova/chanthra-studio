name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $clean = $version -replace '-.*$',''
          $parts = $clean.Split('.')
          while ($parts.Count -lt 3) { $parts += '0' }
          $assemblyVersion = ($parts[0..2] -join '.') + '.0'
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "assemblyVersion=$assemblyVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore ChanthraStudio/ChanthraStudio.csproj

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish ChanthraStudio/ChanthraStudio.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=embedded `
            -p:Version=${{ steps.ver.outputs.version }} `
            -p:AssemblyVersion=${{ steps.ver.outputs.assemblyVersion }} `
            -p:FileVersion=${{ steps.ver.outputs.assemblyVersion }} `
            -o publish

      - name: Package portable zip
        id: pkg
        shell: pwsh
        run: |
          $zipName = "ChanthraStudio-${{ steps.ver.outputs.tag }}-win-x64.zip"
          Compress-Archive -Path publish/* -DestinationPath $zipName -Force
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLowerInvariant()
          "zipName=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Generate release notes
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          $prev = git tag --sort=-v:refname | Where-Object { $_ -ne $tag } | Select-Object -First 1
          if ([string]::IsNullOrEmpty($prev)) {
            $log = "Initial release."
          } else {
            $log = (git log "$prev..HEAD" --pretty=format:"- %s (%h)" --no-merges) -join "`n"
          }
          $sha = "${{ steps.pkg.outputs.sha256 }}"
          $zip = "${{ steps.pkg.outputs.zipName }}"
          $body = "## Chanthra Studio $tag`n`n$log`n`n---`n`nManual install: download ``$zip`` and extract over the existing folder.`nSHA-256: ``$sha```n`nLicense: https://xman4289.com/products/chanthra-studio`nManual: https://xman4289.com/chanthra-studio/manual`n"
          $body | Out-File -Encoding utf8 release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Chanthra Studio ${{ steps.ver.outputs.tag }}
          body_path: release-notes.md
          files: ${{ steps.pkg.outputs.zipName }}
